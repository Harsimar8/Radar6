<div class="toolbar">

    <button (click)="simulationService.setTool(EditorTool.Select)">
        Select
    </button>

    <input
    #fileInput
    type="file"
    accept=".json"
    hidden
    (change)="onFileSelected($event)">

<button (click)="fileInput.click()">
    Upload JSON
</button>

    <button (click)="removeJson()">
    Remove JSON
</button>

 <!-- Filters Button -->
    <div class="filter-container">

        <button (click)="toggleFilters()">
            Filters ▼
        </button>

        @if (showFilters) {

            <div class="filter-dropdown">

                @for (type of entityTypes; track type) {
                   <div class="filter-item">
                    <label>

                        <input
                            type="checkbox"
                            [checked]="filterService.isVisible(type)"
                            (change)="toggleEntityType(type, $event)">

                        {{ type }}

                    </label>
                   </div>

                }

            </div>

        }

    </div>

    <span class="spacer"></span>

     <button (click)="simulationService.showSplit()">
    Split
</button>

<button (click)="simulationService.showLeaflet()">
    Full 2D
</button>

<button (click)="simulationService.showCesium()">
    Full 3D
</button>

</div>
